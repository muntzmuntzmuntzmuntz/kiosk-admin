services:
  - type: web
    name: kiosk-admin
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run start
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kiosk-admin-db
          property: connectionString

databases:
  - name: kiosk-admin-db
    plan: free
